services:
  gh-dashboard:
    build: .
    image: gh-dashboard:latest
    container_name: gh-dashboard
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?set GITHUB_CLIENT_ID in env or .env}
      GITHUB_OAUTH_SCOPES: ${GITHUB_OAUTH_SCOPES:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_DIGEST_MODEL: ${OPENAI_DIGEST_MODEL:-}
    volumes:
      - gh-dashboard-data:/home/node/.gh-issues-dashboard

volumes:
  gh-dashboard-data:
